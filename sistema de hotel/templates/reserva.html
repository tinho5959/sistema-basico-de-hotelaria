<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Reserva</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        * { 
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0d2e 50%, #000428 100%);
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212,175,55,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,215,0,0.05) 0%, transparent 50%);
            z-index: 1;
        }

        .header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(25px);
            padding: 25px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(212,175,55,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo-header {
            display: flex;
            align-items: center;
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            gap: 12px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .back-btn:hover {
            background: rgba(212,175,55,0.2);
            border-color: #D4AF37;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.2);
        }

        .main-content {
            padding: 80px 60px 60px;
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            position: relative;
        }

        .page-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #D4AF37, #FFD700);
            border-radius: 2px;
        }

        .page-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            max-width: 500px;
            margin: 0 auto;
        }

        .info-bar {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: center;
        }

        .info-icon {
            font-size: 32px;
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            flex-shrink: 0;
        }

        .info-text {
            flex: 1;
        }

        .info-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            color: #fff;
        }

        .info-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        .form-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 60px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 40px;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .form-input {
            width: 100%;
            padding: 22px 24px 22px 65px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 400;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(15px);
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .form-input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 4px rgba(212,175,55,0.15);
            background: rgba(255,255,255,0.12);
            transform: translateY(-3px);
        }

        .input-icon {
            position: absolute;
            left: 28px;
            top: 56px;
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            transition: 0.3s ease;
            z-index: 2;
        }

        .form-input:focus ~ .input-icon {
            color: #D4AF37;
            transform: scale(1.1);
        }

        .date-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn-primary {
            flex: 1;
            max-width: 240px;
            padding: 24px 40px;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            border: none;
            border-radius: 24px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(39,174,96,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 50px rgba(39,174,96,0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            padding: 24px 40px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-secondary:hover {
            background: rgba(212,175,55,0.2);
            border-color: #D4AF37;
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(212,175,55,0.2);
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px 30px;
                flex-direction: column;
                gap: 20px;
            }
            
            .main-content {
                padding: 60px 25px 40px;
            }
            
            .form-grid, .date-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            
            .form-actions {
                flex-direction: column;
            }
            
            .form-container {
                padding: 50px 30px;
            }
            
            .info-bar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.8;
        }
    </style>
</head>
<body>
   
    <header class="header">
        <div class="logo-header">
            <i class="fas fa-hotel"></i>
            Hotel VICTOR
        </div>
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Dashboard
        </a>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Nova Reserva</h1>
            <p class="page-subtitle">Registre reservas</p>
        </div>

        <div class="info-bar">
            <i class="fas fa-info-circle info-icon"></i>
            <div class="info-text">
                <div class="info-title">Valor Padrão Diária</div>
                <div class="info-subtitle">R$ 250,00 | Quartos 1-50 disponíveis</div>
            </div>
        </div>

        <div class="form-container">
            <form action="/salvar-reserva" method="POST" id="reservationForm">
                <!-- PRIMEIRA LINHA -->
                <div class="form-group full-width">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-input" placeholder="Nome do hóspede" required>
                    <i class="fas fa-user input-icon"></i>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">CPF</label>
                        <input type="text" name="cpf" class="form-input" placeholder="000.000.000-00" required>
                        <i class="fas fa-id-card input-icon"></i>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Telefone</label>
                        <input type="tel" name="telefone" class="form-input" placeholder="(00) 00000-0000" required>
                        <i class="fas fa-phone input-icon"></i>
                    </div>
                </div>

                <div class="date-grid">
                    <div class="form-group">
                        <label class="form-label">Data de Entrada</label>
                        <input type="date" name="entrada" class="form-input" required>
                        <i class="fas fa-calendar-alt input-icon"></i>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Data de Saída</label>
                        <input type="date" name="saida" class="form-input" required>
                        <i class="fas fa-calendar-check input-icon"></i>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-check"></i>
                        Finalizar Reserva
                    </button>
                    <a href="/" class="btn-secondary">
                        <i class="fas fa-times"></i>
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script>
       
        document.addEventListener('DOMContentLoaded', function() {
            const cpfInput = document.querySelector('input[name="cpf"]');
            const telInput = document.querySelector('input[name="telefone"]');
            
            cpfInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                e.target.value = value.substring(0, 14);
            });
            
            telInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                value = value.replace(/(\d{2})(\d)/, '($1) $2');
                value = value.replace(/(\d{4,5})(\d{4})$/, '$1-$2');
                e.target.value = value.substring(0, 15);
            });
            
            const entradaInput = document.querySelector('input[name="entrada"]');
            const saidaInput = document.querySelector('input[name="saida"]');
            
            saidaInput.addEventListener('change', function() {
                if (entradaInput.value && this.value <= entradaInput.value) {
                    this.setCustomValidity('Data de saída deve ser posterior à entrada');
                } else {
                    this.setCustomValidity('');
                }
            });
            
            const formContainer = document.querySelector('.form-container');
            formContainer.style.opacity = '0';
            formContainer.style.transform = 'translateY(40px)';
            setTimeout(() => {
                formContainer.style.transition = 'all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                formContainer.style.opacity = '1';
                formContainer.style.transform = 'translateY(0)';
            }, 300);
        });
    </script>
</body>
</html>
