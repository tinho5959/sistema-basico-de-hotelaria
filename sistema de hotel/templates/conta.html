<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { 
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a0033 50%, #000428 100%);
            color: #fff;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(255,215,0,0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .signup-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .signup-wrapper {
            display: flex;
            max-width: 1000px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.15);
            overflow: hidden;
            box-shadow: 
                0 35px 70px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.05);
        }

        .visual-panel {
            flex: 1;
            padding: 80px 60px;
            background: linear-gradient(135deg, rgba(212,175,55,0.15) 0%, rgba(255,215,0,0.08) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hotel-logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(48px, 10vw, 72px);
            font-weight: 900;
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 25px;
            animation: logoGlow 3s ease-in-out infinite alternate;
            text-align: center;
        }

        @keyframes logoGlow {
            from { filter: drop-shadow(0 0 15px rgba(212,175,55,0.6)); }
            to { filter: drop-shadow(0 0 30px rgba(212,175,55,0.9)); }
        }

        .hotel-tagline {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            line-height: 1.6;
            text-align: center;
            max-width: 300px;
            margin: 0 auto;
        }

        .form-panel {
            flex: 1;
            padding: 80px 60px;
            max-width: 420px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 45px;
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #f8f8f8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
        }

        .input-group {
            position: relative;
            margin-bottom: 28px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .input-field {
            width: 100%;
            padding: 20px 24px 20px 60px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 400;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(15px);
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .input-field:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 4px rgba(212,175,55,0.15);
            background: rgba(255,255,255,0.12);
            transform: translateY(-3px);
        }

        .input-icon {
            position: absolute;
            left: 24px;
            top: 52px;
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            transition: 0.3s ease;
            z-index: 2;
        }

        .input-field:focus ~ .input-icon {
            color: #D4AF37;
            transform: scale(1.1);
        }

        .select-wrapper {
            position: relative;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 18px;
        }

        .form-actions {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-primary {
            padding: 22px;
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            border: none;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(212,175,55,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(212,175,55,0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            padding: 22px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-secondary:hover {
            background: rgba(212,175,55,0.2);
            border-color: #D4AF37;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(212,175,55,0.2);
        }

        @media (max-width: 1024px) {
            .signup-wrapper {
                flex-direction: column;
                max-width: 500px;
            }
            
            .visual-panel {
                padding: 60px 40px;
                display: none;
            }
            
            .form-panel {
                padding: 60px 40px;
            }
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 20px 15px;
            }
            
            .form-panel {
                padding: 50px 30px;
            }
        }

        .loading {
            display: none;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(212,175,55,0.3);
            border-top: 2px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    
    <div class="particles" id="particles"></div>

    <div class="signup-container">
        <div class="signup-wrapper">
            
            <div class="visual-panel">
                <div class="hotel-logo">Hotel</div>
                <p class="hotel-tagline">
                    Crie sua conta administrativa e gerencie<br>
                    o hotel de luxo com total controle
                </p>
            </div>

            <div class="form-panel">
                <div class="form-header">
                    <h1 class="form-title">Criar Conta</h1>
                    <p class="form-subtitle">Sistema Administrativo</p>
                </div>

                <form action="/salvar-conta" method="POST" id="signupForm">
                    <div class="input-group">
                        <label class="input-label">Nome Completo</label>
                        <input type="text" name="nome" class="input-field" placeholder="Digite seu nome completo" required>
                        <i class="fas fa-user input-icon"></i>
                    </div>

                    <div class="input-group">
                        <label class="input-label">E-mail</label>
                        <input type="email" name="email" class="input-field" placeholder="seuemail@hotelluxor.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Senha</label>
                        <input type="password" name="senha" class="input-field" placeholder="Mínimo 8 caracteres" required>
                        <i class="fas fa-lock input-icon"></i>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Tipo de Usuário</label>
                        <div class="select-wrapper">
                            <select name="tipo" class="input-field" required>
                                <option value="" disabled selected>Selecione o tipo</option>
                                <option value="funcionario">Funcionário</option>
                                <option value="admin">Administrador</option>
                            </select>
                            <i class="fas fa-user-tag input-icon"></i>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">
                            <span id="btnText">Finalizar Cadastro</span>
                            <div class="loading" id="loading"></div>
                        </button>
                        <a href="/login" class="btn-secondary">
                            <i class="fas fa-arrow-left"></i>
                            Voltar ao Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 5) + 's';
                container.appendChild(particle);
            }
        }

        document.getElementById('signupForm').addEventListener('submit', function() {
            const btn = document.querySelector('.btn-primary');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');
            
            btnText.style.display = 'none';
            loading.style.display = 'inline-block';
            btn.disabled = true;
        });

        createParticles();
        
        document.body.style.opacity = '0';
        setTimeout(() => {
            document.body.style.transition = 'opacity 0.8s';
            document.body.style.opacity = '1';
        }, 100);
    </script>
</body>
</html>
