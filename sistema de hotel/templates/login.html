<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        * { 
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: 
                radial-gradient(ellipse at top left, rgba(212,175,55,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(255,215,0,0.05) 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #1a0d2e 40%, #000428 100%);
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #D4AF37, transparent),
                radial-gradient(2px 2px at 80px 80px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 120px 40px, #D4AF37, transparent),
                radial-gradient(1px 1px at 200px 120px, rgba(255,255,255,0.3), transparent);
            background-repeat: repeat;
            background-size: 300px 200px;
            animation: bgFloat 25s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        .login-wrapper {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 80px 60px;
            position: relative;
            background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, transparent 100%);
        }

        .hotel-branding {
            max-width: 400px;
        }

        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: clamp(42px, 8vw, 72px);
            font-weight: 900;
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 50%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(212,175,55,0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(212,175,55,0.8)); }
        }

        .hotel-tagline {
            font-size: clamp(16px, 2.5vw, 20px);
            font-weight: 300;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 14px;
            color: #000;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }

        .right-panel {
            flex: 0 0 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(30px);
            border-left: 1px solid rgba(212,175,55,0.2);
        }

        .login-card {
            width: 100%;
            max-width: 380px;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #f8f8f8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            font-weight: 400;
        }

        .form-group {
            position: relative;
            margin-bottom: 24px;
        }

        .form-input {
            width: 100%;
            padding: 20px 24px 20px 60px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 400;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(15px);
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .form-input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 4px rgba(212,175,55,0.15);
            background: rgba(255,255,255,0.12);
            transform: translateY(-3px);
        }

        .input-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            transition: 0.3s ease;
        }

        .form-input:focus ~ .input-icon {
            color: #D4AF37;
            transform: translateY(-50%) scale(1.1);
        }

        .login-button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            border: none;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(212,175,55,0.3);
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(212,175,55,0.4);
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .login-button:hover::before {
            left: 100%;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            z-index: 20;
        }

        @media (max-width: 1024px) {
            .login-wrapper {
                flex-direction: column;
            }
            
            .left-panel {
                padding: 60px 40px;
                text-align: center;
                align-items: center;
            }
            
            .right-panel {
                flex: none;
                padding: 40px 30px;
            }
            
            .features-grid {
                grid-template-columns: 1fr;
                justify-items: center;
            }
        }

        @media (max-width: 768px) {
            .left-panel {
                display: none;
            }
            
            .right-panel {
                flex: 1;
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>
    
    <div class="login-wrapper">
        
        <div class="left-panel">
            <div class="hotel-branding">
                <h1 class="logo-main">HOTEL VICTOR</h1>
                <p class="hotel-tagline">
                    Experiência hoteleira de classe mundial<br>
                    Gerencie com excelência e sofisticação
                </p>
                
                <div class="features-grid">
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-bed"></i>
                        </div>
                        <span>Gestão de Quartos</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <span>Controle de Hóspedes</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <span>Relatórios em Tempo Real</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-concierge-bell"></i>
                        </div>
                        <span>Serviços Premium</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="login-card">
                <div class="welcome-section">
                    <h2 class="welcome-title">Bem-vindo de volta</h2>
                    <p class="welcome-subtitle">Acesse o painel administrativo</p>
                </div>

                <form action="/logar" method="POST">
                    <div class="form-group">
                        <input type="email" name="usuario" class="form-input" placeholder="Email corporativo" required>
                        <i class="fas fa-user input-icon"></i>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" name="senha" class="form-input" placeholder="Senha" required>
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                    
                    <button type="submit" class="login-button">
                        Entrar no Sistema
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-crown"></i> Hotel VICTOR © 2026 - Sistema 
    </div>

    <script>
        
        const logoMain = document.querySelector('.logo-main');
        const originalText = logoMain.textContent;
        let i = 0;
        
        function typeWriter() {
            if (i < originalText.length) {
                logoMain.textContent = originalText.slice(0, i + 1);
                i++;
                setTimeout(typeWriter, 150);
            } else {
                setTimeout(() => {
                    i = originalText.length;
                    typeWriterReverse();
                }, 2000);
            }
        }
        
        function typeWriterReverse() {
            if (i >= 0) {
                logoMain.textContent = originalText.slice(0, i);
                i--;
                setTimeout(typeWriterReverse, 100);
            } else {
                i = 0;
                setTimeout(typeWriter, 1000);
            }
        }
        
        window.addEventListener('load', () => {
            setTimeout(typeWriter, 500);
        });
    </script>
</body>
</html>
